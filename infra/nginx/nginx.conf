worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # ── Log format enriquecido para observabilidade ──────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    upstream backend_api {
        server web:8000;
        keepalive 32;    # reutiliza conexões para menor latência
    }

    # ── Servidor principal ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Healthcheck
        location /health {
            proxy_pass http://backend_api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Debug (remover em produção)
        location /api/v1/debug/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API principal
        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";    # keepalive no upstream
        }

        # ── stub_status — EXCLUSIVO para o nginx-exporter ─────────────────
        # Bloqueado para IPs externos; só acessível dentro da rede Docker
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.0.0.0/8;    # rede interna Docker
            deny all;
        }
    }
}