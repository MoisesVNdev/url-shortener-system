worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    upstream api_servers {
        least_conn;                    # algoritmo: menor número de conexões ativas
        server web1:8000 max_fails=3 fail_timeout=30s;
        server web2:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;                  # reuso de conexões HTTP keep-alive
    }

    # Rate limit global (proteção)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/s;

    server {
        listen 80;

        # Health check do próprio Nginx
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            limit_req zone=api_limit burst=400 nodelay;

            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";          # necessário para keepalive upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}